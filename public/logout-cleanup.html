<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <title>Signing out...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: #333;
            margin: 0;
            font-size: 24px;
        }
        p {
            color: #666;
            margin: 10px 0 0 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Signing out...</h1>
        <p>Clearing session data. Please wait.</p>
    </div>

    <script>
        // Get redirect parameter
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || '/login.html?fresh=1&loggedOut=1&t=' + Date.now();

        // Delete all cookies - this is crucial for Azure SWA
        function deleteCookie(name, paths = ['/', '/.auth']) {
            const date = new Date(1970, 1, 1);
            paths.forEach(path => {
                document.cookie = `${name}=; path=${path}; expires=${date.toUTCString()}; SameSite=None; Secure`;
                document.cookie = `${name}=; path=${path}; expires=${date.toUTCString()}`;
            });
        }

        // Aggressively clear all browser storage and cookies
        try {
            // Clear localStorage
            localStorage.clear();
            
            // Clear sessionStorage
            sessionStorage.clear();
            
            // Clear all cookies
            deleteCookie('StaticWebAppsAuthCookie');
            deleteCookie('StaticWebAppsAuthCookie-aad');
            deleteCookie('StaticWebAppsAuthCookie-microsoft');
            deleteCookie('StaticWebAppsAuthCookie-google');
            deleteCookie('StaticWebAppsAuthCookie-github');
            
            // Generic cookie clearing
            document.cookie.split(";").forEach(function(c) {
                const eqPos = c.indexOf("=");
                const cookieName = eqPos > -1 ? c.substr(0, eqPos).trim() : c.trim();
                if (cookieName) {
                    deleteCookie(cookieName);
                }
            });
            
            console.log('All storage and cookies cleared');
            
        } catch (e) {
            console.warn('Could not clear storage/cookies:', e);
        }

        // Force browser cache invalidation
        window.location.hash = Math.random();
        
        // After clearing local data, also log out of Microsoft's identity platform.
        // This clears the Microsoft SSO browser session so it doesn't auto-sign back in.
        // Without this step, Microsoft silently re-authenticates with the cached account
        // even after SWA's session is cleared.
        setTimeout(() => {
            const finalLoginUrl = window.location.origin + redirect + (redirect.includes('?') ? '&nocache=' : '?nocache=') + Date.now();
            const msLogoutUrl = 'https://login.microsoftonline.com/common/oauth2/v2.0/logout'
                + '?post_logout_redirect_uri=' + encodeURIComponent(finalLoginUrl);
            window.location.replace(msLogoutUrl);
        }, 800);
    </script>
</body>
</html>
