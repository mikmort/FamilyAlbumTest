<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing out...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: #333;
            margin: 0;
            font-size: 24px;
        }
        p {
            color: #666;
            margin: 10px 0 0 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Signing out...</h1>
        <p>Clearing session data. Please wait.</p>
    </div>

    <script>
        // Get redirect parameter
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || '/login.html?fresh=1&loggedOut=1&t=' + Date.now();

        // Aggressively clear all browser storage to ensure no cached user data persists
        try {
            // Clear localStorage
            localStorage.clear();
            
            // Clear sessionStorage
            sessionStorage.clear();
            
            // Clear cookies by setting them to expire
            document.cookie.split(";").forEach(function(c) {
                document.cookie = c
                    .replace(/^ +/, "")
                    .replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
            });
            
            // For Azure Static Web Apps, also try to clear the auth cookie specifically
            const authCookieNames = ['StaticWebAppsAuthCookie', 'StaticWebAppsAuthCookie-AAD', 'StaticWebAppsAuthCookie-Google', 'StaticWebAppsAuthCookie-GitHub'];
            authCookieNames.forEach(name => {
                document.cookie = name + "=;expires=" + new Date().toUTCString() + ";path=/";
                document.cookie = name + "=;expires=" + new Date().toUTCString() + ";path=/;domain=" + document.domain;
            });
            
        } catch (e) {
            console.warn('Could not clear storage:', e);
        }

        // Redirect to login after a short delay to ensure clearing is complete
        setTimeout(() => {
            window.location.href = redirect;
        }, 500);
    </script>
</body>
</html>
