<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - Family Album</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
            max-width: 560px;
            width: 100%;
            padding: 32px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            line-height: 1.6;
            margin: 0 0 16px;
        }

        .button {
            display: inline-block;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            padding: 14px 18px;
            cursor: pointer;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            background: #f8fafc;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Admin Account Setup</h1>
        <p>This page activates the initial admin accounts for the Family Album site.</p>
        <p>If you are not signed in yet, use the button below first. After Microsoft sign-in, you will return here automatically and the setup will run.</p>

        <a id="signinLink" class="button" href="/.auth/login/aad?post_login_redirect_uri=/setup-admin.html">Sign in and run setup</a>

        <div id="status" class="status">Checking sign-in state...</div>
    </div>

    <script>
        async function run() {
            const status = document.getElementById('status');

            try {
                const meResponse = await fetch('/.auth/me');
                const meData = await meResponse.json();

                if (!meData.clientPrincipal) {
                    status.textContent = 'You are not signed in yet. Click "Sign in and run setup".';
                    return;
                }

                status.textContent = 'Signed in as ' + meData.clientPrincipal.userDetails + '. Running setup...';

                const setupResponse = await fetch('/api/setup-admin');
                const setupData = await setupResponse.json();

                if (!setupResponse.ok) {
                    status.textContent = 'Setup failed:\n' + JSON.stringify(setupData, null, 2);
                    return;
                }

                status.textContent = 'Setup complete.\n\n' + JSON.stringify(setupData, null, 2) + '\n\nNow go back to / and sign in normally.';
            } catch (error) {
                status.textContent = 'Unexpected error: ' + error.message;
            }
        }

        run();
    </script>
</body>
</html>
