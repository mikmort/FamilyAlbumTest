<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switching Account - Family Album</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .message {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 { color: #667eea; margin-bottom: 10px; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="message">
        <h2>📸 Family Album</h2>
        <p id="status">Signing out&hellip;</p>
        <p style="margin-top: 12px; font-size: 13px;">
            If this takes too long, <a id="fallback-link" href="/login.html?fresh=1">continue to sign-in</a>
        </p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'switch';

        function msLogoutUrl() {
            const destination = mode === 'logout'
                ? '/login.html?fresh=1&loggedOut=1'
                : '/login.html?fresh=1&switch=1';

            return 'https://login.microsoftonline.com/common/oauth2/v2.0/logout?post_logout_redirect_uri=' +
                encodeURIComponent(window.location.origin + destination);
        }

        // Wait until /.auth/logout has fully cleared the SWA session before
        // redirecting. This prevents SWA from silently re-issuing the old session
        // because the logout hadn't propagated yet.
        async function waitForLogout() {
            for (let i = 0; i < 20; i++) {
                try {
                    const res = await fetch('/.auth/me', { cache: 'no-store' });
                    const data = await res.json();
                    if (!data.clientPrincipal) {
                        // Confirmed signed out in SWA.
                        // Next clear Microsoft identity session to avoid reusing old account.
                        document.getElementById('status').textContent = 'Clearing Microsoft session…';
                        window.location.replace(msLogoutUrl());
                        return;
                    }
                } catch (e) { /* ignore */ }
                document.getElementById('status').textContent =
                    'Completing sign out\u2026 (' + (i + 1) + ')';
                await new Promise(r => setTimeout(r, 500));
            }
            // Still signed in after 10 s — force another logout
            window.location.replace(
                '/.auth/logout?post_logout_redirect_uri=' +
                encodeURIComponent(window.location.href)
            );
        }

        document.getElementById('fallback-link').href = msLogoutUrl();
        waitForLogout();
    </script>
</body>
</html>
