<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switching Account - Family Album</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .message {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 { color: #667eea; margin-bottom: 10px; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="message">
        <h2>📸 Family Album</h2>
        <p id="status">Signing out&hellip;</p>
    </div>
    <script>
        // Wait until /.auth/logout has fully cleared the SWA session before
        // redirecting. This prevents SWA from silently re-issuing the old session
        // because the logout hadn't propagated yet.
        async function waitForLogout() {
            for (let i = 0; i < 20; i++) {
                try {
                    const res = await fetch('/.auth/me', { cache: 'no-store' });
                    const data = await res.json();
                    if (!data.clientPrincipal) {
                        // Confirmed signed out — go to login page
                        // Using login.html (user must click) so the browser
                        // cannot silently complete the OAuth flow.
                        window.location.replace('/login.html?fresh=1');
                        return;
                    }
                } catch (e) { /* ignore */ }
                document.getElementById('status').textContent =
                    'Completing sign out\u2026 (' + (i + 1) + ')';
                await new Promise(r => setTimeout(r, 500));
            }
            // Still signed in after 10 s — force another logout
            window.location.replace(
                '/.auth/logout?post_logout_redirect_uri=' +
                encodeURIComponent(window.location.href)
            );
        }
        waitForLogout();
    </script>
</body>
</html>
