<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switching Account - Family Album</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .message {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 { color: #667eea; margin-bottom: 10px; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="message">
        <h2>📸 Family Album</h2>
        <p>Redirecting to sign in&hellip;</p>
    </div>
    <script>
        // Navigate to AAD login with prompt=login as a fresh top-level navigation.
        // This ensures the parameter is respected by Azure SWA/AAD — unlike when
        // it is embedded inside a post_logout_redirect_uri chain.
        window.location.replace('/.auth/login/aad?post_login_redirect_uri=/&prompt=login');
    </script>
</body>
</html>
